<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Panel | Faculty</title>
    <style>
        :root {
    --faculty-blue: #1e3a8a;
    --success: #16a34a;
    --danger: #dc2626;
    --gray-bg: #f3f4f6;
}

/* Security: Block Text Selection */
.no-select {
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
}

body { background: var(--gray-bg); font-family: 'Inter', sans-serif; margin: 0; padding: 40px; }

.table-wrapper {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 18px; text-align: left; border-bottom: 1px solid #e5e7eb; }
th { background: #f9fafb; color: #4b5563; font-weight: 600; }

/* Buttons */
.action-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
.approve { background: var(--success); color: white; margin-right: 8px; }
.reject { background: var(--danger); color: white; }
.view-btn { background: #e5e7eb; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

/* Suggestion Modal Styles */
.modal-overlay {
    display: none; 
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
}

.modal-box {
    background: white;
    width: 500px;
    margin: 10% auto;
    padding: 30px;
    border-radius: 12px;
}

#suggestionInput {
    width: 100%;
    height: 120px;
    margin: 20px 0;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    resize: none;
}

.modal-footer { display: flex; justify-content: flex-end; gap: 12px; }
.confirm-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
.cancel-btn { background: #9ca3af; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body class="no-select">

    <div class="container">
        <header class="page-header">
            <h1>Project Verification Portal</h1>
            <p>Review student submissions and provide constructive feedback.</p>
        </header>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Project Name</th>
                        <th>Student Roll No.</th>
                        <th>Details</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="moderationTable">
                    <tr>
                        <td>AI Health Diagnostic</td>
                        <td>2023CSE015</td>
                        <td><button class="view-btn">View Code</button></td>
                        <td>
                            <button class="action-btn approve" onclick="approveProject(this)">Approve</button>
                            <button class="action-btn reject" onclick="openRejectModal(this)">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="rejectModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Rejection Feedback</h3>
            <p>Please specify why this project is being rejected so the student can improve.</p>
            
            <textarea id="suggestionInput" placeholder="Enter your suggestions here (e.g., Fix the GitHub README, add more comments to the logic)..."></textarea>
            
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="confirm-btn" onclick="submitRejection()">Confirm & Send Feedback</button>
            </div>
        </div>
    </div>

    <script >
        let selectedRow = null;

// Security: Disable Right-Click and Copy
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && (e.key === 'c' || e.key === 'u'))) return false;
};

// Open Suggestion Box when Reject is clicked
function openRejectModal(button) {
    selectedRow = button.closest('tr');
    document.getElementById('rejectModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('rejectModal').style.display = 'none';
    document.getElementById('suggestionInput').value = "";
}

function submitRejection() {
    const suggestion = document.getElementById('suggestionInput').value;
    
    if (suggestion.trim().length < 10) {
        alert("Please provide a detailed suggestion (at least 10 characters).");
        return;
    }

    // Logic to update UI
    const projectName = selectedRow.cells[0].innerText;
    console.log(`Project [${projectName}] rejected with feedback: ${suggestion}`);
    
    selectedRow.style.opacity = "0.3";
    selectedRow.style.pointerEvents = "none";
    
    alert("Rejection submitted with suggestions.");
    closeModal();
}

function approveProject(button) {
    const row = button.closest('tr');
    row.style.background = "#dcfce7";
    alert("Project approved and visible to juniors!");
}
    </script>
</body>
</html>
