<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-position: center;
            background-size: cover;
            background: linear-gradient(to bottom, #000428, #004e92); 
            /* background-color: rgb(4, 4, 82); */
        }
        .container{
            width:300px;
            height:450px;
            border:1px solid black;
            align-items: center;
            margin: 50px auto;
            border-radius: 20px;
            transform: .1s;
            background-color: white;
        
        }
        .container:hover{
            box-shadow: 0 0 10px gray;
            transform: scale(1.02);
        }
        h1{
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            margin-top: 20px;
            font-family: Arial, Helvetica, sans-serif;
            color:  rgb(12, 12, 211);;

        }
        .username, .password{
            width: 250px;
            height: 50px;
            /* border: 1px solid black; */
            margin: 25px auto;
            border-radius: 5px;
            font-size: 14px;
            /* padding-left: 10px; */
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            transform: 0s;
            border-bottom: 3px solid  rgb(12, 12, 211);;
        }
        .username input, .password input{
            height: 25px;
            /* margin-top: 5px; */
            border-radius: 5px;
            font-size: 14px;
            /* padding-left: 5px; */
            border: none;
            outline: none;
        }

        .username label, .password label{
            top:50%;
            left: 10px;
            padding-top: 5px;
            font-size: 14px;
            color: gray;
            transform: .5s;
            font-family: Arial, Helvetica, sans-serif;
        }
        .username:hover, .password:hover{
            box-shadow: 0 0 5px gray;
            transform: scale(1.01);
        }
        .submit{
            height: auto;
            width: auto;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }
        button{
            width: 250px;
            height: 35px;
            margin: 20px auto;
            border-radius: 25px;
            border: none;
            background-color:  rgb(12, 12, 211);;
            color: white;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            cursor: pointer;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: 2s;
        }
        button:hover{
            background-color:  rgb(9, 9, 172);
            transform: scale(1.05);
        }

        a{
            color:white;
            text-decoration:none;
        }
        a:hover{
            color:#cccccc;
        }
    </style>
</head>
<body>
    

    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="username">
                <label for="email">ID/Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="password">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="submit">
                <input type="checkbox" id="rememberMe"> Remember me 
                <a href="login.html">Forget Password</a>
            </div>
            <div id="errorMessage" style="color: red; text-align: center; margin: 10px 0;"></div>
            <div><button type="button" id="studentLoginBtn" class="login-btn">Student Login</button></div>
            <div><button type="button" id="facultyLoginBtn" class="login-btn">Faculty Login</button></div>
            <p style="text-align: center;">Don't have an account?<a href="register.html">register</a></p>
        </form>
    </div>

    <script src="auth.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const studentLoginBtn = document.getElementById('studentLoginBtn');
        const facultyLoginBtn = document.getElementById('facultyLoginBtn');
        const errorMessage = document.getElementById('errorMessage');
        let isStudentLogin = true;

        // Handle student login
        studentLoginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            isStudentLogin = true;
            handleLogin();
        });

        // Handle faculty login
        facultyLoginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            isStudentLogin = false;
            handleLogin();
        });

        // Main login handler
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                errorMessage.innerText = 'Please enter email and password';
                return;
            }

            // Disable buttons during submission
            studentLoginBtn.disabled = true;
            facultyLoginBtn.disabled = true;
            studentLoginBtn.innerText = 'Logging in...';

            try {
                const result = await authAPI.login(email, password);

                // Check user type
                if (isStudentLogin && result.user.userType !== 'student') {
                    throw new Error('This account is registered as Faculty. Please use Faculty Login.');
                }
                if (!isStudentLogin && result.user.userType !== 'faculty') {
                    throw new Error('This account is registered as Student. Please use Student Login.');
                }

                // Save remember me preference
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                }

                errorMessage.innerText = '';
                alert('Login Successful! Redirecting...');

                // Redirect to appropriate dashboard
                setTimeout(() => {
                    if (isStudentLogin) {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'facultyinterface.html';
                    }
                }, 1500);
            } catch (error) {
                errorMessage.innerText = error.message || 'Login failed. Please check your credentials.';
                studentLoginBtn.disabled = false;
                facultyLoginBtn.disabled = false;
                studentLoginBtn.innerText = 'Student Login';
            }
        }

        // Handle form submission (Enter key)
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            isStudentLogin = true;
            handleLogin();
        });

        // Load remembered email if available
        window.addEventListener('load', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const user = authAPI.getStoredUser();
                if (user) {
                    document.getElementById('email').value = user.email;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        });
    </script>
</body>
</html>
