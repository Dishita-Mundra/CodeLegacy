<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Class Manager | KRMU</title>
    <style>
        :root {
    --krmu-blue: #1e3a8a;
    --sidebar-bg: #f3f4f6;
    --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.no-select { user-select: none; -webkit-user-select: none; cursor: default; }

body { background: #f9fafb; font-family: 'Inter', sans-serif; margin: 0; }

.dashboard-wrapper { display: flex; min-height: 100vh; }

/* Sidebar Essentials */
.sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid #e5e7eb;
    padding: 30px 20px;
}

.logout{
    /* Styling for the Logout Button */
    background-color: #dc2626; /* Standard Danger Red */
    color: white;               /* Text color */
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    text-decoration: none;      /* In case you use an <a> tag */
    display: inline-block;
}

/* Hover effect: Darkens the red and scales slightly */
.logout-btn:hover {
    background-color: #b91c1c;
    transform: scale(1.05);
}


.profile { text-align: center; margin-bottom: 40px; }
.avatar { font-size: 50px; margin-bottom: 10px; }
.side-nav a {
    display: block;
    padding: 12px;
    color: #4b5563;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 8px;
}
.side-nav a.active { background: var(--krmu-blue); color: white; }

/* Main Content Area */
.main-content { flex: 1; padding: 40px; }

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.essentials .notif { font-size: 20px; margin-right: 20px; position: relative; cursor: pointer; }
.essentials small {
    position: absolute; top: -5px; right: -5px;
    background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px;
}

/* Class Cards */
.class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

.class-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: var(--card-shadow);
    border: 1px solid #eee;
    transition: transform 0.2s;
}

.class-card:hover { transform: translateY(-5px); }

.status-badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin: 15px 0;
}

.pending { background: #fee2e2; color: #b91c1c; }
.cleared { background: #dcfce7; color: #15803d; }

.view-btn {
    width: 100%;
    padding: 10px;
    background: var(--krmu-blue);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
a{
            color:white;
            text-decoration:none;
        }
        a:hover{
            color:#cccccc;
        }
    </style>
</head>
<body class="no-select">

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="profile">
                <div class="avatar">👨‍🏫</div>
                <h4>Dr. Amit Kumar</h4>
                <p>Senior Professor</p>
            </div>
            <nav class="side-nav">
                <a href="#" class="active">📚 Assigned Classes</a>
               
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>My Assigned Classes</h2>
                <div class="essentials">
                    <span class="notif">🔔 <small>3</small></span>
                    <button class="logout">Logout</button>
                </div>
            </header>

            <section class="class-grid">
                <div class="class-card">
                    <div class="class-info">
                        <h3>B.Tech CSE - 6th Sem</h3>
                        <p>Batch: 2023-27 | Section A</p>
                    </div>
                    <div class="status-badge pending">8 Pending Projects</div>
                    <button class="view-btn" onclick="goToClass('CSE-A')">
                        <a href="approved.html" >View Projects </a></button>
                </div>

                <div class="class-card">
                    <div class="class-info">
                        <h3>B.Tech ECE - 4th Sem</h3>
                        <p>Batch: 2024-28 | Section B</p>
                    </div>
                    <div class="status-badge cleared">0 Pending Projects</div>
                    <button class="view-btn" onclick="goToClass('ECE-B')">
                        <a href="approved.html" >View Projects </a></button>
                </div>

                <div class="class-card">
                    <div class="class-info">
                        <h3>BCA - 2nd Sem</h3>
                        <p>Batch: 2025-28 | Section C</p>
                    </div>
                    <div class="status-badge pending">3 Pending Projects</div>
                    <button class="view-btn" onclick="goToClass('BCA-C')">
                        <a href="approved.html" >View Projects </a></button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Protection Logic
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && (e.key === 'c' || e.key === 'u'))) return false;
};

// Navigate to specific class project list
function goToClass(className) {
    alert("Loading projects for class: " + className);
    // window.location.href = "teacher_dashboard.html?class=" + className;
}
    </script>
</body>
</html>
